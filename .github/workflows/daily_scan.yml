name: A股智能选股系统 - 每日自动扫描

on:
  schedule:
    - cron: '30 2 * * 1-5'   # 工作日北京时间 10:30（盘中模式）
    - cron: '0 10 * * 1-5'   # 工作日北京时间 18:00（收盘复盘模式）
    - cron: '0 2 * * 6'      # 周六北京时间 10:00（周末深度分析）
  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: 安装依赖包
        run: pip install -r requirements.txt

      - name: 运行选股扫描
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          TUSHARE_TOKEN:    ${{ secrets.TUSHARE_TOKEN }}
          EMAIL_SENDER:     ${{ secrets.EMAIL_SENDER }}
          EMAIL_PASSWORD:   ${{ secrets.EMAIL_PASSWORD }}
          EMAIL_RECEIVER:   ${{ secrets.EMAIL_RECEIVER }}
        run: python src/scanner.py

      - name: 上传报告
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stock-report-${{ github.run_number }}
          path: reports/
          retention-days: 30

      - name: 提交报告到仓库
        if: success()
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add reports/ || true
          git diff --staged --quiet || git commit -m "📊 自动报告 $(date '+%Y-%m-%d %H:%M')"
          git push || true
